global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: readyset
    static_configs:
      - targets: ["cache:6035"]
    metrics_path: /metrics

  - job_name: postgres
    static_configs:
      - targets: ["postgres_exporter:9187"]
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
